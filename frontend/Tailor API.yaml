openapi: 3.0.3
info:
  title: Tailor API
  version: 1.0.0
paths:
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/User'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/User'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/jobs/:
    get:
      operationId: jobs_list
      tags:
      - jobs
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobApplicationList'
          description: ''
  /api/jobs/{id}/:
    get:
      operationId: jobs_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - jobs
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobApplicationDetail'
          description: ''
  /api/jobs/analyze/:
    post:
      operationId: jobs_analyze_create
      tags:
      - jobs
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/resumes/me/:
    get:
      operationId: resumes_me_retrieve
      tags:
      - resumes
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/resumes/upload/:
    post:
      operationId: resumes_upload_create
      tags:
      - resumes
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
components:
  schemas:
    JobApplicationDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        company_name:
          type: string
        role:
          type: string
        jd_text:
          type: string
        jd_url:
          type: string
          format: uri
          maxLength: 200
        profile_score:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
        status:
          $ref: '#/components/schemas/StatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        agent_results:
          type: string
          readOnly: true
      required:
      - agent_results
      - company_name
      - created_at
      - id
      - jd_text
      - jd_url
      - role
    JobApplicationList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        company_name:
          type: string
        role:
          type: string
        profile_score:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
        status:
          $ref: '#/components/schemas/StatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - company_name
      - created_at
      - id
      - role
    StatusEnum:
      enum:
      - Applied
      - Interviewed
      - Rejected
      - Offered
      type: string
      description: |-
        * `Applied` - Applied
        * `Interviewed` - Interviewed
        * `Rejected` - Rejected
        * `Offered` - Offered
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        password:
          type: string
          writeOnly: true
          maxLength: 128
      required:
      - id
      - password
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
