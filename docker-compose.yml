services:
  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql

  celery:
    build: ./backend
    command: uv run celery -A core worker -l info
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    volumes:
      - media_data:/app/media

  backend:
    build: ./backend
    command: >
      sh -c "uv run manage.py migrate &&
             uv run gunicorn core.wsgi:application --bind 0.0.0.0:8000"
    depends_on:
      - redis
      - celery
      - postgres
    env_file:
      - .env
    volumes:
      - media_data:/app/media
    ports:
      - 8000:8000

  frontend:
    build:
      context: ./frontend
      args:
        PUBLIC_API_BASE_URL: ""
    ports:
      - 80:80
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  media_data:
